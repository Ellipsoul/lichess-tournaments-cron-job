name: Join Lichess team tournaments

on:
  schedule:
    # Daily at 10:00 UTC. GitHub may delay scheduled workflows during high load.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: List matches without joining them
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  join:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      LICHESS_API_TOKEN: ${{ secrets.LICHESS_API_TOKEN }}
      LICHESS_TEAM_ID: ${{ secrets.LICHESS_TEAM_ID }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm start
